name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Make cargo use system git so the `git config insteadOf` rules apply.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.POLYSTORE_DEPLOY_KEY }}
      - name: Use SSH for anatta-rs private deps
        run: git config --global url."git@github.com:anatta-rs/".insteadOf "https://github.com/anatta-rs/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.POLYSTORE_DEPLOY_KEY }}
      - name: Use SSH for anatta-rs private deps
        run: git config --global url."git@github.com:anatta-rs/".insteadOf "https://github.com/anatta-rs/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --workspace

  coverage:
    name: coverage (>= 95%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.POLYSTORE_DEPLOY_KEY }}
      - name: Use SSH for anatta-rs private deps
        run: git config --global url."git@github.com:anatta-rs/".insteadOf "https://github.com/anatta-rs/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate lcov + JSON summary
        run: |
          cargo llvm-cov --all-features --workspace --ignore-filename-regex '(main|bin/[^/]+)\.rs$' --lcov --output-path lcov.info
          cargo llvm-cov --all-features --workspace --ignore-filename-regex '(main|bin/[^/]+)\.rs$' --json --summary-only > coverage.json
      - name: Enforce coverage gate
        run: |
          PCT=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          echo "Line coverage: ${PCT}%"
          python3 - <<EOF
          import sys
          pct = float("${PCT}")
          threshold = 95.0
          if pct < threshold:
              print(f"::error::coverage {pct}% < {threshold}%")
              sys.exit(1)
          print(f"OK: {pct}% >= {threshold}%")
          EOF
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # e2e-neo4j job removed — pm-graph crate now lives in anatta-rs/pm-graph (private).
  # The e2e suite runs there, not in pm.
